{{- $currentPage := . }}
{{- $pages := partial "section-pages.html" . }}
<nav class="section-nav docs-links">
  <ul class="list-unstyled">
    {{- range $pages }}
      {{- $active := $currentPage.Eq . }}
      <li {{ if $active }} class="active"{{ end }}>
        <a {{ if $active }} aria-current="page"{{ end }} href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
    {{- end }}
  </ul>
</nav>
